<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스코어보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;font-family:'Noto Sans KR','Malgun Gothic',sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:flex-end}
#school-logo{position:fixed;top:16px;left:16px;z-index:10;opacity:0;transition:opacity 0.5s}
#school-logo.visible{opacity:1}
#scoreboard{width:100%;height:44px;display:flex;align-items:center;background:#1a1a2e;border-top:2px solid #e94560;color:#fff;opacity:0;transition:opacity 0.5s;position:relative;z-index:5}
#scoreboard.visible{opacity:1}
.game-info{background:#0f3460;padding:0 10px;height:100%;display:flex;align-items:center;font-size:11px;color:#a0c4ff;white-space:nowrap;max-width:200px;overflow:hidden}
.team-section{display:flex;align-items:center;height:100%;flex:1;justify-content:center;gap:4px}
.team{display:flex;align-items:center;gap:8px;padding:0 6px}
.team-name{font-size:14px;font-weight:700;letter-spacing:1px}
.team-logo{width:30px;height:30px;border-radius:50%;object-fit:cover;display:none;border:2px solid rgba(255,255,255,0.4);box-shadow:0 0 8px rgba(255,255,255,0.25);flex-shrink:0}
.team-logo.has-logo{display:block}
.score{font-size:24px;font-weight:900;min-width:30px;text-align:center;color:#ffd700;padding:0 6px}
.vs-divider{width:2px;height:24px;background:#e94560;margin:0 6px}
.count-section{display:flex;align-items:center;gap:16px;padding:0 16px;height:100%;background:#0a1628}
.inning{font-size:19px;font-weight:900;color:#e94560;min-width:46px;text-align:center;letter-spacing:1px}
.inning-half{font-size:13px}
.bases{position:relative;width:42px;height:42px;flex-shrink:0;margin-top:4px}
.base{position:absolute;width:15px;height:15px;border:1.5px solid #666;background:transparent;transform:rotate(45deg)}
.base.active{background:#ffd700;border-color:#ffd700}
.base-2{left:50%;top:4px;margin-left:-7.5px}
.base-3{left:1px;top:50%;margin-top:-4.5px}
.base-1{right:1px;top:50%;margin-top:-4.5px}
.bso{display:flex;gap:11px;font-size:13px;font-weight:700}
.bso-row{display:flex;align-items:center;gap:4px}
.bso-label{color:#999;margin-right:2px;font-size:13px;font-weight:900}
.dot{width:12px;height:12px;border-radius:50%;border:1.5px solid #666;background:transparent}
.dot.ball.active{background:#4caf50;border-color:#4caf50}
.dot.strike.active{background:#ffd700;border-color:#ffd700}
.dot.out.active{background:#e94560;border-color:#e94560}
</style>
<style>
/* 타자 정보 바 */
#batterInfo{position:fixed;bottom:50px;z-index:6;opacity:0;transition:opacity 0.5s;pointer-events:none}
#batterInfo.visible{opacity:1}
#batterInfo.pos-left{left:10px}
#batterInfo.pos-center{left:50%;transform:translateX(-50%)}
#batterInfo.pos-right{right:10px}
.bi-bar{display:inline-flex;align-items:center;gap:8px;background:rgba(15,52,96,0.92);border-radius:8px;padding:4px 14px;color:#fff;font-size:13px;white-space:nowrap;border:1px solid rgba(233,69,96,0.5)}
.bi-name{font-weight:900;color:#ffd700;font-size:14px}
.bi-sep{color:#e94560;font-weight:700}
.bi-results{display:flex;gap:6px;align-items:center}
.bi-result{background:rgba(255,255,255,0.12);padding:2px 7px;border-radius:4px;font-size:12px;font-weight:600}
.bi-pitch{font-weight:900;color:#ffd700;font-size:15px}
/* 라인업 오버레이 */
#lineup-overlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:580px;height:480px;opacity:0;transition:opacity 0.5s;z-index:3}
#lineup-overlay.visible{opacity:1}
.field-bg{width:100%;height:100%;position:relative}
.field-svg{width:100%;height:100%}
.team-banner{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:6px 24px;border-radius:6px;font-size:16px;font-weight:700;text-align:center;white-space:nowrap}
.team-banner .sub{font-size:11px;color:#a0c4ff;font-weight:400}
.pos{position:absolute;text-align:center;transform:translate(-50%,-50%)}
.pos .name{background:rgba(0,0,0,0.8);color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;white-space:nowrap}
.pos .num{font-size:10px;color:#ffd700;margin-top:1px}
.pos .position-label{font-size:9px;color:#aaa}
.pos-p{top:56%;left:50%}.pos-c{top:82%;left:50%}
.pos-1b{top:68%;left:66%}.pos-2b{top:50%;left:60%}
.pos-3b{top:68%;left:34%}.pos-ss{top:50%;left:40%}
.pos-lf{top:28%;left:22%}.pos-cf{top:18%;left:50%}.pos-rf{top:28%;left:78%}
.bat-item{display:flex;align-items:center;padding:5px 12px;background:rgba(255,255,255,0.08);border-radius:8px}
.bat-item .order-num{font-size:18px;font-weight:900;color:#e94560;min-width:28px;text-align:center}
.bat-item .player-name{flex:1;font-size:14px;font-weight:700;color:#fff;padding:0 8px}
.bat-item .player-num{font-size:13px;color:#ffd700;min-width:34px;text-align:center;font-weight:700}
.bat-item .player-pos{font-size:11px;color:#a0c4ff;min-width:30px;text-align:center;font-weight:600}
</style>
</head>
<body>
<script>!function(){var h=location.hostname;if(h&&h!=='coson35.github.io'&&h!=='localhost'&&h!=='127.0.0.1'){document.documentElement.innerHTML=''}}()</script>
<div id="school-logo">
  <img src="sinwol-logo.png" width="60" height="60" style="object-fit:contain">
</div>
<!-- 라인업 오버레이 -->
<div id="lineup-overlay">
  <div id="defenseView" class="field-bg">
    <div style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;overflow:hidden">
      <img src="20260313_131937.png" style="width:100%;height:100%;object-fit:cover">
    </div>
    <div class="team-banner">
      <span id="lineupTeamName">우리팀</span>
      <div class="sub">수비 포지션</div>
    </div>
    <div class="pos pos-p" id="pos-P"><div class="name" id="name-P">-</div><div class="num" id="num-P"></div><div class="position-label">P</div></div>
    <div class="pos pos-c" id="pos-C"><div class="name" id="name-C">-</div><div class="num" id="num-C"></div><div class="position-label">C</div></div>
    <div class="pos pos-1b" id="pos-1B"><div class="name" id="name-1B">-</div><div class="num" id="num-1B"></div><div class="position-label">1B</div></div>
    <div class="pos pos-2b" id="pos-2B"><div class="name" id="name-2B">-</div><div class="num" id="num-2B"></div><div class="position-label">2B</div></div>
    <div class="pos pos-3b" id="pos-3B"><div class="name" id="name-3B">-</div><div class="num" id="num-3B"></div><div class="position-label">3B</div></div>
    <div class="pos pos-ss" id="pos-SS"><div class="name" id="name-SS">-</div><div class="num" id="num-SS"></div><div class="position-label">SS</div></div>
    <div class="pos pos-lf" id="pos-LF"><div class="name" id="name-LF">-</div><div class="num" id="num-LF"></div><div class="position-label">LF</div></div>
    <div class="pos pos-cf" id="pos-CF"><div class="name" id="name-CF">-</div><div class="num" id="num-CF"></div><div class="position-label">CF</div></div>
    <div class="pos pos-rf" id="pos-RF"><div class="name" id="name-RF">-</div><div class="num" id="num-RF"></div><div class="position-label">RF</div></div>
  </div>
  <div id="battingView" style="display:none;width:100%;height:100%">
    <div style="width:100%;height:100%;background:rgba(0,0,0,0.85);border-radius:12px;padding:12px;display:flex;flex-direction:column">
      <div style="text-align:center;padding:8px 0;border-bottom:2px solid #e94560;margin-bottom:8px">
        <span id="batTeamName" style="color:#fff;font-size:18px;font-weight:900">우리팀</span>
        <span style="color:#a0c4ff;font-size:12px;display:block">타순</span>
      </div>
      <div id="batList" style="flex:1;display:flex;flex-direction:column;gap:3px;overflow:hidden"></div>
    </div>
  </div>
</div>
<!-- 타자 정보 바 -->
<div id="batterInfo"><div class="bi-bar"><span class="bi-name" id="biName"></span><span class="bi-sep">|</span><span class="bi-results" id="biResults"></span></div></div>
<!-- 스코어보드 하단바 -->
<div id="scoreboard">
  <div class="game-info" id="gameInfo"></div>
  <div class="team-section">
    <div class="team">
      <img class="team-logo" id="awayLogo" src="" alt="">
      <span class="team-name" id="awayName">AWAY</span>
    </div>
    <span class="score" id="awayScore">0</span>
    <div class="vs-divider"></div>
    <span class="score" id="homeScore">0</span>
    <div class="team">
      <span class="team-name" id="homeName">HOME</span>
      <img class="team-logo" id="homeLogo" src="" alt="">
    </div>
  </div>
  <div class="count-section">
    <div class="inning"><span class="inning-half" id="inningHalf">▲</span><span id="inningNum">1</span></div>
    <div class="bases">
      <div class="base base-2" id="base2"></div>
      <div class="base base-3" id="base3"></div>
      <div class="base base-1" id="base1"></div>
    </div>
    <div class="bso">
      <div class="bso-row"><span class="bso-label">B</span><span class="dot ball" id="b1"></span><span class="dot ball" id="b2"></span><span class="dot ball" id="b3"></span></div>
      <div class="bso-row"><span class="bso-label">S</span><span class="dot strike" id="s1"></span><span class="dot strike" id="s2"></span></div>
      <div class="bso-row"><span class="bso-label">O</span><span class="dot out" id="o1"></span><span class="dot out" id="o2"></span></div>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(firebaseConfig);
const db=firebase.database(),gameRef=db.ref('game'),batterInfoRef=db.ref('batterInfo'),lineupRef=db.ref('lineup'),overlayRef=db.ref('config/overlay');

// 오버레이 설정 적용
overlayRef.on('value',snap=>{
  const c=snap.val()||{};
  const barH=c.barH||44,barFont=c.barFont||14,infoFont=c.infoFont||11,barBottom=c.barBottom||0;
  const linScale=c.linScale||100,linTop=c.linTop||50,linLeft=c.linLeft||50;
  const logoSize=c.logoSize||60;
  const cBg=c.colorBg||'#1a1a2e',cBorder=c.colorBorder||'#e94560',cTeam=c.colorTeam||'#ffffff';
  const cScore=c.colorScore||'#ffd700',cInning=c.colorInning||'#e94560';
  const cInfoBg=c.colorInfoBg||'#0f3460',cCountBg=c.colorCountBg||'#0a1628';
  const board=document.getElementById('scoreboard');
  board.style.height=barH+'px';
  board.style.background=cBg;
  board.style.borderTopColor=cBorder;
  board.style.marginBottom=barBottom+'px';
  document.body.style.paddingBottom=barBottom+'px';
  document.querySelectorAll('.team-name').forEach(el=>{el.style.fontSize=barFont+'px';el.style.color=cTeam});
  document.querySelectorAll('.score').forEach(el=>{el.style.fontSize=Math.round(barFont*1.7)+'px';el.style.color=cScore});
  const inn=document.querySelector('.inning');
  if(inn){inn.style.fontSize=Math.round(barFont*1.35)+'px';inn.style.color=cInning}
  const gi=document.querySelector('.game-info');
  if(gi){gi.style.fontSize=infoFont+'px';gi.style.background=cInfoBg}
  const cs=document.querySelector('.count-section');
  if(cs)cs.style.background=cCountBg;
  const vd=document.querySelector('.vs-divider');
  if(vd)vd.style.background=cBorder;
  const lineup=document.getElementById('lineup-overlay');
  lineup.style.width=(580*linScale/100)+'px';
  lineup.style.height=(480*linScale/100)+'px';
  lineup.style.top=linTop+'%';
  lineup.style.left=linLeft+'%';
  const logoImg=document.querySelector('#school-logo img');
  if(logoImg){logoImg.width=logoSize;logoImg.height=logoSize}
  const biEl=document.getElementById('batterInfo');
  biEl.style.bottom=(barH+barBottom+6)+'px';
});

// 타자 정보
batterInfoRef.on('value',snap=>{
  const d=snap.val();
  const el=document.getElementById('batterInfo');
  if(!d||!d.visible){el.classList.remove('visible');return}
  el.className='';
  el.classList.add('pos-'+(d.position||'center'));
  const nameEl=document.getElementById('biName');
  const resEl=document.getElementById('biResults');
  if(d.mode==='pitcher'){
    nameEl.textContent=d.pitcherName||'투수';
    resEl.innerHTML='<span class="bi-pitch">'+(d.pitchCount||0)+'구</span>';
  }else{
    nameEl.textContent=d.batterName||'타자';
    const abs=d.atBats||[];
    if(abs.length){resEl.innerHTML=abs.map(a=>'<span class="bi-result">'+a+'</span>').join('')}
    else{resEl.innerHTML='<span style="color:#aaa;font-size:12px">첫 타석</span>'}
  }
  el.classList.add('visible');
});

// 스코어보드
gameRef.on('value',snap=>{
  const d=snap.val();if(!d)return;
  const board=document.getElementById('scoreboard');
  const logo=document.getElementById('school-logo');
  if(d.visible){board.classList.add('visible');logo.classList.add('visible')}else{board.classList.remove('visible');logo.classList.remove('visible');return}
  document.getElementById('gameInfo').textContent=d.gameTitle||'';
  document.getElementById('awayName').textContent=d.awayName||'AWAY';
  document.getElementById('homeName').textContent=d.homeName||'HOME';
  document.getElementById('awayScore').textContent=d.awayScore||0;
  document.getElementById('homeScore').textContent=d.homeScore||0;
  const aL=document.getElementById('awayLogo'),hL=document.getElementById('homeLogo');
  if(d.awayLogo){aL.src=d.awayLogo;aL.classList.add('has-logo')}else{aL.classList.remove('has-logo')}
  if(d.homeLogo){hL.src=d.homeLogo;hL.classList.add('has-logo')}else{hL.classList.remove('has-logo')}
  document.getElementById('inningNum').textContent=d.inning||1;
  document.getElementById('inningHalf').textContent=d.inningHalf==='bottom'?'▼':'▲';
  document.getElementById('base1').classList.toggle('active',!!d.base1);
  document.getElementById('base2').classList.toggle('active',!!d.base2);
  document.getElementById('base3').classList.toggle('active',!!d.base3);
  const b=d.balls||0,s=d.strikes||0,o=d.outs||0;
  for(let i=1;i<=3;i++)document.getElementById('b'+i).classList.toggle('active',i<=b);
  for(let i=1;i<=2;i++)document.getElementById('s'+i).classList.toggle('active',i<=s);
  for(let i=1;i<=2;i++)document.getElementById('o'+i).classList.toggle('active',i<=o);
});

// 라인업
lineupRef.on('value',snap=>{
  const d=snap.val();if(!d)return;
  const overlay=document.getElementById('lineup-overlay');
  if(d.visible){overlay.classList.add('visible')}else{overlay.classList.remove('visible');return}
  const mode=d.displayMode||'defense';
  const defView=document.getElementById('defenseView');
  const batView=document.getElementById('battingView');
  if(mode==='batting'){
    defView.style.display='none';batView.style.display='block';
    document.getElementById('batTeamName').textContent=d.teamName||'우리팀';
    const list=document.getElementById('batList');list.innerHTML='';
    const bo=d.battingOrder||{};
    for(let i=1;i<=9;i++){
      const p=bo[i]||{name:'-',number:'',position:''};
      list.innerHTML+=`<div class="bat-item"><span class="order-num">${i}</span><span class="player-name">${p.name||'-'}</span><span class="player-num">${p.number?'#'+p.number:''}</span><span class="player-pos">${p.position||''}</span></div>`;
    }
  }else{
    defView.style.display='block';batView.style.display='none';
    document.getElementById('lineupTeamName').textContent=d.teamName||'우리팀';
    const positions=['P','C','1B','2B','3B','SS','LF','CF','RF'];
    positions.forEach(pos=>{
      const player=d.players&&d.players[pos];
      document.getElementById('name-'+pos).textContent=player?player.name:'-';
      document.getElementById('num-'+pos).textContent=player?('#'+player.number):'';
    });
  }
});
</script>
</body>
</html>
