<title>스코어보드 컨트롤러</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#f5f5f5;color:#222;min-height:100vh;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;border:1px solid #ddd;border-radius:12px;font-weight:700;transition:all 0.1s;background:#fff;color:#222}
button:active{transform:scale(0.96)}
input,select{font-family:inherit;border-radius:12px;border:1px solid #ddd;background:#fff;color:#222;padding:12px 14px;font-size:16px;width:100%}
input:focus,select:focus{outline:none;border-color:#2c6fbb}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;padding:24px;background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);position:relative}
.login-title{font-size:22px;font-weight:900;color:#1a1a2e;letter-spacing:1px}
#loginScreen input{max-width:280px;text-align:center;font-size:18px}
.login-btn{background:linear-gradient(135deg,#1a4a8a,#2c6fbb);color:#fff;padding:14px;font-size:17px;border:none;border-radius:12px;width:100%;max-width:280px}
#loginError{color:#e94560;font-size:14px;display:none}
.login-credit{position:absolute;bottom:24px;color:#999;font-size:13px;font-weight:600}
.bso-dot:active,.base-b:active{transform:scale(0.9);opacity:0.7}
#mainApp{display:none;padding:12px;padding-bottom:70px}
</style>
</head>

  <button id="adminToggle" onclick="toggleAdminMode()" style="position:absolute;top:16px;right:16px;font-size:11px;color:#aaa;background:transparent;border:1px solid #ddd;padding:6px 12px;border-radius:20px">
    <svg viewBox="0 0 24 24" width="12" height="12" style="vertical-align:middle;margin-right:3px"><path d="M12 2a5 5 0 015 5v3H7V7a5 5 0 015-5z" fill="none" stroke="#aaa" stroke-width="2"/><rect x="3" y="10" width="18" height="12" rx="2" fill="none" stroke="#aaa" stroke-width="2"/><circle cx="12" cy="16" r="1.5" fill="#aaa"/></svg>관리자
  </button>

<style>
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.top-bar .title{font-size:17px;font-weight:900}
.logout-btn{background:#f0f0f0;color:#e94560;padding:8px 14px;font-size:13px;border:none}
.overlay-section{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ov-btn{padding:12px;font-size:14px;border-radius:12px;text-align:center;border:2px solid #ddd;background:#fff;color:#888}
.ov-btn.on{background:#4caf50;color:#fff;border-color:#4caf50}
.ov-btn.off-active{background:#fff;color:#999;border-color:#ccc;box-shadow:inset 0 0 0 2px #eee}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.card-title{font-size:16px;font-weight:700;margin-bottom:12px;text-align:center}
.score-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
.score-team{text-align:center}
.score-team .name{font-size:16px;font-weight:900;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-team .val{font-size:44px;font-weight:900}
.score-team .btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;padding:0 4px}
.score-team .btns button{padding:10px 0;font-size:18px;border-radius:10px}
.btn-plus{background:#4caf50;color:#fff;border:none}
.btn-minus{background:#f0f0f0;color:#222}
.score-vs{font-size:20px;color:#ccc;padding:0 6px}
.swap-btn{width:100%;padding:12px;font-size:15px;background:#ff9800;color:#fff;border:none;border-radius:12px;margin-top:10px}
.inning-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.inning-row .arrow{width:48px;height:48px;font-size:20px;border-radius:50%;background:#f0f0f0}
.inning-row .val{font-size:32px;font-weight:900;min-width:80px;text-align:center}
.half-btn{padding:12px 24px;font-size:15px;background:#ff9800;color:#fff;border:none;border-radius:12px}
.bso-row{display:flex;align-items:center;margin-bottom:14px}
.bso-row .bso-name{font-size:16px;font-weight:700;min-width:70px}
.bso-row .dots{display:flex;gap:10px;flex:1;justify-content:center}
.bso-dot{width:44px;height:44px;border-radius:50%;border:2px solid #ddd;background:#f8f8f8;cursor:pointer}
.bso-dot.b-on{background:#4caf50;border-color:#4caf50}
.bso-dot.s-on{background:#ffd700;border-color:#ffd700}
.bso-dot.o-on{background:#e94560;border-color:#e94560}
.bso-reset{display:block;margin:0 auto;padding:10px 24px;font-size:14px;background:#f0f0f0;border-radius:12px}
.base-wrap{position:relative;width:140px;height:140px;margin:0 auto 12px}
.base-b{position:absolute;width:44px;height:44px;transform:rotate(45deg);border:2px solid #ddd;background:#f8f8f8;cursor:pointer;border-radius:6px}
.base-b.on{background:#ffd700;border-color:#ffd700}
.base-b.b2{left:48px;top:0}.base-b.b3{left:0;top:48px}.base-b.b1{right:0;top:48px}
.base-clear{display:block;margin:0 auto;padding:10px 24px;font-size:14px;background:#f0f0f0;border-radius:12px}
.tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;z-index:100}
.tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:700;color:#bbb;background:#fff;border:none;border-radius:0;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab svg{width:20px;height:20px;fill:currentColor}
.tab.active{color:#e94560}
.form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.form-row label{font-size:13px;color:#888;min-width:80px;font-weight:600;flex-shrink:0}
.form-row input,.form-row select{flex:1}

<style>
.game-list{max-height:300px;overflow-y:auto}
.game-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#f8f8f8;border-radius:12px;margin-bottom:6px;border:2px solid transparent}
.game-item.active-game{border-color:#0f3460;background:#eef3ff}
.game-item .info{font-size:14px;font-weight:600;flex:1;min-width:0}

.game-item .btns{display:flex;gap:4px;flex-shrink:0}
.game-item .btns button{padding:6px 10px;font-size:12px;border-radius:8px}
.lin-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.lin-row .pos{font-size:14px;font-weight:900;color:#e94560;min-width:30px;text-align:center}
.lin-row input,.lin-row select{flex:1;padding:10px;font-size:14px}
.lin-row .num{max-width:55px}
.btn-save{width:100%;padding:12px;font-size:15px;background:#0f3460;color:#fff;border:none;border-radius:12px;margin-top:8px}
.btn-apply{width:100%;padding:12px;font-size:15px;background:#4caf50;color:#fff;border:none;border-radius:12px;margin-top:8px}
.btn-danger{width:100%;padding:12px;font-size:15px;background:#e94560;color:#fff;border:none;border-radius:12px;margin-top:8px}
.btn-warn{width:100%;padding:12px;font-size:15px;background:#ff9800;color:#fff;border:none;border-radius:12px;margin-top:8px}
.lineup-mode-section{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mode-btn{padding:12px;font-size:14px;border-radius:12px;text-align:center;border:2px solid #ddd;background:#fff;color:#888}
.mode-btn.active{background:#0f3460;color:#fff;border-color:#0f3460}
.bat-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.bat-row .order{font-size:16px;font-weight:900;color:#0f3460;min-width:24px;text-align:center}
.bat-row input,.bat-row select{flex:1;padding:10px;font-size:14px}
.bat-row .num{max-width:55px}
.bat-row .pos-sel{max-width:70px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
.modal .card-title{margin-bottom:16px}
/* 선수 명단 */
.roster-item{display:flex;align-items:center;padding:10px;background:#f8f8f8;border-radius:10px;margin-bottom:4px;gap:8px}
.roster-item .r-num{font-weight:900;color:#0f3460;min-width:30px;text-align:center}
.roster-item .r-name{flex:1;font-weight:600}
.roster-item .r-pos{color:#888;font-size:13px;min-width:30px}
.roster-item button{padding:4px 8px;font-size:11px;border-radius:6px}
.player-select{padding:10px;font-size:14px;border-radius:12px;border:1px solid #ddd;background:#fff;width:100%}
/* 타자 정보 */
.bi-section{margin-top:4px}
.bi-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.bi-toggle button{padding:10px;font-size:14px;border-radius:10px;border:2px solid #ddd;background:#fff;color:#888}
.bi-toggle button.active{border-color:#0f3460;background:#0f3460;color:#fff}
.bi-mode-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.bi-mode-btn{padding:10px;font-size:13px;border-radius:10px;border:2px solid #ddd;background:#fff;color:#888}
.bi-mode-btn.active{border-color:#e94560;background:#e94560;color:#fff}
.bi-pos-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.bi-pos-btn{padding:8px;font-size:13px;border-radius:10px;border:2px solid #ddd;background:#fff;color:#888;text-align:center}
.bi-pos-btn.active{border-color:#ff9800;background:#ff9800;color:#fff}
.bi-result-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.bi-res-btn{padding:10px 4px;font-size:13px;border-radius:10px;border:1px solid #ddd;background:#f8f8f8;text-align:center;font-weight:700}
.bi-res-btn:active{background:#4caf50;color:#fff}
.bi-atbats{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0;min-height:28px;padding:8px;background:#f8f8f8;border-radius:10px}
.bi-ab-tag{background:#0f3460;color:#fff;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px}
.bi-ab-tag .del{cursor:pointer;color:#ffd700;font-size:14px;font-weight:900}
.bi-pitch-row{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0}
.bi-pitch-val{font-size:36px;font-weight:900;min-width:60px;text-align:center;color:#0f3460}
.bi-pitch-btn{width:52px;height:52px;border-radius:50%;font-size:22px;font-weight:900;border:none}

</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(firebaseConfig);
const db=firebase.database(),gameRef=db.ref('game'),lineupRef=db.ref('lineup'),savedGamesRef=db.ref('savedGames'),savedLineupsRef=db.ref('savedLineups'),configRef=db.ref('config'),rosterRef=db.ref('roster'),teamsRef=db.ref('teams'),batterInfoRef=db.ref('batterInfo');
let isAdmin=false,selectedRole='user',activeGameKey='';
const DEFAULT_ADMIN_PW='admin1234';
async function sha256(msg){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
const DEFAULT_ADMIN_HASH=sha256(DEFAULT_ADMIN_PW);
let gd={visible:false,gameTitle:'',awayName:'AWAY',homeName:'HOME',awayScore:0,homeScore:0,awayLogo:'',homeLogo:'',inning:1,inningHalf:'top',balls:0,strikes:0,outs:0,base1:false,base2:false,base3:false};
let ld={visible:false,teamName:'',players:{},displayMode:'defense'};
let rosterList=[],teamsList=[];
const POS=['P','C','1B','2B','3B','SS','LF','CF','RF'];
const PN={P:'투수',C:'포수','1B':'1루수','2B':'2루수','3B':'3루수',SS:'유격수',LF:'좌익수',CF:'중견수',RF:'우익수'};
const ALLPOS=['P','C','1B','2B','3B','SS','LF','CF','RF','IF','OF','UT'];
const APN={P:'투수',C:'포수','1B':'1루수','2B':'2루수','3B':'3루수',SS:'유격수',LF:'좌익수',CF:'중견수',RF:'우익수',IF:'내야수',OF:'외야수',UT:'야수'};
let scoreVisible=false,lineupVisible=false;
let biData={visible:false,mode:'batter',position:'center',batterOrder:1,batterName:'',batterNumber:'',atBats:[],pitcherName:'',pitcherNumber:'',pitchCount:0};

// 기기 잠금 시스템
const lockRef=db.ref('controlLock');
let deviceId=localStorage.getItem('deviceId');
if(!deviceId){deviceId=Math.random().toString(36).substr(2,9)+Date.now().toString(36);localStorage.setItem('deviceId',deviceId)}
let lockData=null,lockTimer=null,lockCountdown=null,DEFAULT_LOCK_MIN=5;

// 세션 체크는 모든 스크립트 로드 후 실행
let _sessionChecked=false;
function checkSessionOnLoad(){
  if(_sessionChecked)return;_sessionChecked=true;
  const s=localStorage.getItem('scoreSession');
  if(s){try{const d=JSON.parse(s);selectedRole=d.role;isAdmin=d.role==='admin';enterApp();}catch(e){localStorage.removeItem('scoreSession')}}
}

function toggleAdminMode(){
  if(selectedRole==='user'){selectedRole='admin';document.getElementById('adminToggle').style.borderColor='#2c6fbb';document.getElementById('adminToggle').style.color='#2c6fbb';document.getElementById('pwInput').placeholder='관리자 비밀번호'}
  else{selectedRole='user';document.getElementById('adminToggle').style.borderColor='#ddd';document.getElementById('adminToggle').style.color='#aaa';document.getElementById('pwInput').placeholder='비밀번호'}
}
function doLogin(){
  const pw=document.getElementById('pwInput').value;if(!pw){alert('비밀번호를 입력하세요');return}
  document.getElementById('loginError').style.display='none';
  sha256(pw).then(hash=>{
    if(selectedRole==='admin'){
      configRef.child('adminPassword').once('value',async s=>{
        const stored=s.val();
        if(!stored){if(hash===await DEFAULT_ADMIN_HASH){isAdmin=true;localStorage.setItem('scoreSession',JSON.stringify({role:'admin'}));enterApp()}else document.getElementById('loginError').style.display='block';return}
        if(hash===stored){isAdmin=true;localStorage.setItem('scoreSession',JSON.stringify({role:'admin'}));enterApp()}
        else if(pw===stored){isAdmin=true;configRef.child('adminPassword').set(hash);localStorage.setItem('scoreSession',JSON.stringify({role:'admin'}));enterApp()}
        else document.getElementById('loginError').style.display='block';
      });
    }else{
      configRef.child('userPassword').once('value',s=>{
        const stored=s.val();
        if(!stored){alert('사용자 비밀번호가 설정되지 않았습니다.\n관리자에게 문의하세요.');return}
        if(hash===stored){isAdmin=false;localStorage.setItem('scoreSession',JSON.stringify({role:'user'}));enterApp()}
        else if(pw===stored){isAdmin=false;configRef.child('userPassword').set(hash);localStorage.setItem('scoreSession',JSON.stringify({role:'user'}));enterApp()}
        else document.getElementById('loginError').style.display='block';
      });
    }
  });
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function doLogout(){localStorage.removeItem('scoreSession');location.reload()}
function enterApp(){document.getElementById('loginScreen').style.display='none';const m=document.getElementById('mainApp');m.style.display='block';m.style.padding='12px';m.style.paddingBottom='70px';buildUI();initApp();restoreTab()}
function restoreTab(){const id=localStorage.getItem('activeTab');if(!id||id==='tabGame')return;const content=document.getElementById(id);if(!content)return;document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('active');if(t.getAttribute('onclick')&&t.getAttribute('onclick').indexOf(id)!==-1)t.classList.add('active')});content.style.display='block'}
</script>
<script>
function buildUI(){
const m=document.getElementById('mainApp');
let h=`<div class="top-bar"><span class="title">⚾ 스코어보드</span><button class="logout-btn" onclick="doLogout()">로그아웃</button></div>`;
h+=`<div class="overlay-section"><button class="ov-btn" id="ovScoreOn" onclick="setOv('score',true)">스코어 ON</button><button class="ov-btn" id="ovScoreOff" onclick="setOv('score',false)">스코어 OFF</button><button class="ov-btn" id="ovLineupOn" onclick="setOv('lineup',true)">라인업 ON</button><button class="ov-btn" id="ovLineupOff" onclick="setOv('lineup',false)">라인업 OFF</button></div>`;
h+=`<div id="linModeQuick" style="display:none;margin-bottom:14px"><div class="lineup-mode-section"><button class="mode-btn" id="qModeDefense" onclick="setLineupMode('defense')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;margin-right:3px"><path d="M12 2L3 9l2 11h14l2-11L12 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="10" r="2" fill="currentColor"/></svg>수비 위치</button><button class="mode-btn" id="qModeBatting" onclick="setLineupMode('batting')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;margin-right:3px"><line x1="8" y1="6" x2="18" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="14" x2="18" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="4.5" cy="6" r="1.5" fill="currentColor"/><circle cx="4.5" cy="10" r="1.5" fill="currentColor"/><circle cx="4.5" cy="14" r="1.5" fill="currentColor"/></svg>타순</button></div></div>`;
h+=`<div id="lockBar" style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px 14px;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.05)"><div id="lockStatus" style="flex:1;font-size:13px;font-weight:600;color:#888">잠금 없음</div><span id="lockTime" style="font-size:13px;font-weight:700;color:#e94560;min-width:40px;text-align:center"></span><button id="lockBtn" onclick="toggleLock()" style="padding:8px 14px;font-size:13px;border-radius:10px;border:none;background:#0f3460;color:#fff;font-weight:700;white-space:nowrap">조작 잠금</button></div>`;
h+=`<div id="lockDesc" style="font-size:11px;color:#aaa;margin:-8px 0 10px 2px">잠금을 누르면 이 기기에서만 조작 가능합니다. 다른 기기는 조작이 차단됩니다.</div>`;
h+=`<div id="lockOverlay" style="display:none;position:relative"><div id="lockMsg" style="text-align:center;padding:20px;background:#fff3f3;border-radius:12px;margin-bottom:12px;font-size:14px;font-weight:700;color:#e94560">다른 기기에서 조작 중입니다</div></div>`;
h+=`<div id="tabGame" class="tab-content"></div><div id="tabSetup" class="tab-content" style="display:none"></div><div id="tabLineup" class="tab-content" style="display:none"></div><div id="tabRoster" class="tab-content" style="display:none"></div><div id="tabAdmin" class="tab-content" style="display:none"></div>`;

function fillBatFromRoster(i){
  const sel=document.getElementById('bat-sel-'+i);
  const r=rosterList.find(x=>x.key===sel.value);
  if(r){const posEl=document.getElementById('bat-pos-'+i);if(r.position)posEl.value=r.position}

function updateLineupSelects(){
  const opts=rosterOptions();
  POS.forEach(p=>{const el=document.getElementById('ln-sel-'+p);if(el){const v=el.value;el.innerHTML='<option value="">선수 선택</option>'+opts;el.value=v}});
  for(let i=1;i<=9;i++){const el=document.getElementById('bat-sel-'+i);if(el){const v=el.value;el.innerHTML='<option value="">선수 선택</option>'+opts;el.value=v}}

function saveLinPreset(){
  const name=prompt('라인업 이름을 입력하세요\n(예: 3학년 라인업, 2학년 라인업)');
  if(!name||!name.trim())return;
  const p={};POS.forEach(pos=>{p[pos]={name:document.getElementById('ln-'+pos).value||'',number:document.getElementById('ln-n-'+pos).value||''}});
  const bo={};for(let i=1;i<=9;i++){
    const sel=document.getElementById('bat-sel-'+i);
    const r=rosterList.find(x=>x.key===sel.value);
    bo[i]={name:r?r.name:'',number:r?r.number:'',position:document.getElementById('bat-pos-'+i).value||''};
  }
  savedLineupsRef.push({name:name.trim(),teamName:document.getElementById('linTeam').value||'',players:p,battingOrder:bo,createdAt:Date.now()});
  alert('라인업 프리셋 저장 완료');
}
function loadLinPresets(){
  savedLineupsRef.on('value',s=>{
    const el=document.getElementById('linPresetList');if(!el)return;
    const d=s.val();if(!d){el.innerHTML='<div style="text-align:center;color:#aaa;padding:12px">저장된 라인업이 없습니다</div>';return}
    const entries=Object.entries(d);entries.sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
    el.innerHTML=entries.map(([k,g])=>`<div class="game-item"><div class="info"><div style="font-weight:700">${g.name||'이름없음'}</div><div class="sub">${g.teamName||''}</div></div><div class="btns"><button style="background:#4caf50;color:#fff;border:none" onclick="loadLinPreset('${k}')">불러오기</button><button style="background:#e94560;color:#fff;border:none" onclick="delLinPreset('${k}')">삭제</button></div></div>`).join('');
  });
}
function loadLinPreset(k){
  savedLineupsRef.child(k).once('value',s=>{
    const g=s.val();if(!g)return;
    const $=id=>document.getElementById(id);
    if($('linTeam'))$('linTeam').value=g.teamName||'';
    if(g.players){POS.forEach(p=>{
      const nm=$('ln-'+p),nu=$('ln-n-'+p),sel=$('ln-sel-'+p);
      if(nm)nm.value=g.players[p]?g.players[p].name||'':'';
      if(nu)nu.value=g.players[p]?g.players[p].number||'':'';
      if(sel){const r=rosterList.find(x=>x.name===(g.players[p]&&g.players[p].name)&&x.number==String(g.players[p]&&g.players[p].number));sel.value=r?r.key:''}
    })}
    if(g.battingOrder){for(let i=1;i<=9;i++){
      const sel=$('bat-sel-'+i),pos=$('bat-pos-'+i);
      const bo=g.battingOrder[i];
      if(bo&&sel){const r=rosterList.find(x=>x.name===bo.name&&x.number==String(bo.number));sel.value=r?r.key:''}
      if(bo&&pos)pos.value=bo.position||'';
    }}
    alert('라인업 불러오기 완료\n적용하려면 "라인업 저장 및 표시"를 눌러주세요');
  });
}
function delLinPreset(k){if(confirm('이 라인업 프리셋을 삭제할까요?'))savedLineupsRef.child(k).remove()}
function clearLinFields(){
  const $=id=>document.getElementById(id);
  if($('linTeam'))$('linTeam').value='';
  POS.forEach(p=>{if($('ln-'+p))$('ln-'+p).value='';if($('ln-n-'+p))$('ln-n-'+p).value='';if($('ln-sel-'+p))$('ln-sel-'+p).value=''});
  for(let i=1;i<=9;i++){if($('bat-sel-'+i))$('bat-sel-'+i).value='';if($('bat-pos-'+i))$('bat-pos-'+i).value=''}
}

<script>
function initApp(){
  if(isAdmin)configRef.child('userPassword').on('value',s=>{const el=document.getElementById('curUPw');if(el)el.value=s.val()?'(설정됨)':'(없음)'});
  gameRef.on('value',s=>{const d=s.val();if(!d)return;gd=d;scoreVisible=!!gd.visible;updUI();updOvBtns()});
  lineupRef.on('value',s=>{const d=s.val();if(d){ld=d;lineupVisible=!!ld.visible;updOvBtns();
    const dm=d.displayMode||'defense';const md=document.getElementById('modeDefense'),mb=document.getElementById('modeBatting');
    if(md)md.className='mode-btn'+(dm==='defense'?' active':'');if(mb)mb.className='mode-btn'+(dm==='batting'?' active':'');
    fillLineupFields();buildBiSelects();
  }});
  rosterRef.on('value',s=>{rosterList=[];const d=s.val();if(d)Object.entries(d).forEach(([k,v])=>rosterList.push({key:k,...v}));rosterList.sort((a,b)=>Number(a.number)-Number(b.number));renderRoster();updateLineupSelects();fillLineupFields();buildBiSelects()});
  teamsRef.on('value',s=>{teamsList=[];const d=s.val();if(d)Object.entries(d).forEach(([k,v])=>teamsList.push({key:k,...v}));teamsList.sort((a,b)=>(a.name||'').localeCompare(b.name||''))});
  loadGames();
  loadLinPresets();
  initLock();
  initBatterInfo();
  initOverlayCfg();
  configRef.child('activeGameKey').on('value',s=>{activeGameKey=s.val()||'';loadGames()});
}
function updUI(){
  const $=id=>document.getElementById(id);
  if($('cAway'))$('cAway').textContent=gd.awayName||'AWAY';if($('cHome'))$('cHome').textContent=gd.homeName||'HOME';
  if($('cAwayS'))$('cAwayS').textContent=gd.awayScore||0;if($('cHomeS'))$('cHomeS').textContent=gd.homeScore||0;
  if($('cInn'))$('cInn').textContent=gd.inning||1;if($('cHalf'))$('cHalf').textContent=gd.inningHalf==='bottom'?'▼':'▲';
  for(let i=0;i<3;i++){const el=$('bd'+i);if(el)el.className='bso-dot'+(i<(gd.balls||0)?' b-on':'')}
  for(let i=0;i<2;i++){const el=$('sd'+i);if(el)el.className='bso-dot'+(i<(gd.strikes||0)?' s-on':'')}
  for(let i=0;i<2;i++){const el=$('od'+i);if(el)el.className='bso-dot'+(i<(gd.outs||0)?' o-on':'')}
  ['1','2','3'].forEach(n=>{const el=$('cB'+n);if(el)el.className='base-b b'+n+(gd['base'+n]?' on':'')});
}
function updOvBtns(){
  const $=id=>document.getElementById(id);
  if($('ovScoreOn'))$('ovScoreOn').className='ov-btn'+(scoreVisible?' on':'');
  if($('ovScoreOff'))$('ovScoreOff').className='ov-btn'+(!scoreVisible?' off-active':'');
  if($('ovLineupOn'))$('ovLineupOn').className='ov-btn'+(lineupVisible?' on':'');
  if($('ovLineupOff'))$('ovLineupOff').className='ov-btn'+(!lineupVisible?' off-active':'');
  const qp=$('linModeQuick');if(qp)qp.style.display=lineupVisible?'block':'none';
  updQuickMode();
}
function updQuickMode(){
  const dm=ld.displayMode||'defense';
  const qd=document.getElementById('qModeDefense'),qb=document.getElementById('qModeBatting');
  if(qd)qd.className='mode-btn'+(dm==='defense'?' active':'');
  if(qb)qb.className='mode-btn'+(dm==='batting'?' active':'');
}
function setOv(t,on){if(t==='score'){gameRef.update({visible:on});scoreVisible=on}else{lineupRef.update({visible:on});lineupVisible=on}updOvBtns()}
function chScore(t,d){extendLock();const k=t==='away'?'awayScore':'homeScore';gameRef.update({[k]:Math.max(0,(gd[k]||0)+d)})}
function swapHA(){extendLock();gameRef.update({awayName:gd.homeName,homeName:gd.awayName,awayScore:gd.homeScore,homeScore:gd.awayScore,awayLogo:gd.homeLogo||'',homeLogo:gd.awayLogo||''})}
function chInn(d){extendLock();gameRef.update({inning:Math.max(1,(gd.inning||1)+d)})}
function togHalf(){extendLock();gameRef.update({inningHalf:gd.inningHalf==='top'?'bottom':'top'})}
function togBSO(t,v){extendLock();gameRef.update({[t]:(gd[t]||0)>=v?v-1:v})}
function rstCnt(){extendLock();gameRef.update({balls:0,strikes:0,outs:0})}
function togB(n){extendLock();gameRef.update({['base'+n]:!gd['base'+n]})}
function clrB(){extendLock();gameRef.update({base1:false,base2:false,base3:false})}
function switchTab(id,el){document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).style.display='block';el.classList.add('active');localStorage.setItem('activeTab',id)}
</script>
<script>

<script>
function editG(k){
  savedGamesRef.child(k).once('value',s=>{
    const g=s.val();if(!g)return;
    const modal=document.createElement('div');modal.className='modal-bg';modal.id='editModal';
    modal.innerHTML=`<div class="modal"><div class="card-title">경기 정보 수정</div>
      <div class="form-row"><label>경기명</label><input id="edTitle" value="${g.gameTitle||''}"></div>
      <div class="form-row"><label>원정팀</label><input id="edAway" value="${g.awayName||''}"></div>
      <div class="form-row"><label>홈팀</label><input id="edHome" value="${g.homeName||''}"></div>
      <div class="form-row"><label>원정로고</label><input id="edALogo" value="${(g.awayLogo||'').length>100?'(업로드됨)':g.awayLogo||''}"></div>
      <div class="form-row"><label></label><input type="file" id="edFileALogo" accept="image/*" style="font-size:13px;padding:8px"></div>
      <div class="form-row"><label>홈로고</label><input id="edHLogo" value="${(g.homeLogo||'').length>100?'(업로드됨)':g.homeLogo||''}"></div>
      <div class="form-row"><label></label><input type="file" id="edFileHLogo" accept="image/*" style="font-size:13px;padding:8px"></div>
      <button class="btn-save" onclick="saveEditG('${k}')">저장</button>
      <button class="btn-danger" onclick="closeEditModal()" style="margin-top:6px">취소</button></div>`;
    document.body.appendChild(modal);
    document.getElementById('edFileALogo').onchange=function(){const f=this.files[0];if(!f)return;if(f.size>500000){alert('500KB 이하');return}const r=new FileReader();r.onload=e=>{document.getElementById('edALogo').value=e.target.result};r.readAsDataURL(f)};
    document.getElementById('edFileHLogo').onchange=function(){const f=this.files[0];if(!f)return;if(f.size>500000){alert('500KB 이하');return}const r=new FileReader();r.onload=e=>{document.getElementById('edHLogo').value=e.target.result};r.readAsDataURL(f)};
    modal._origALogo=g.awayLogo||'';modal._origHLogo=g.homeLogo||'';
  });
}
function saveEditG(k){
  const modal=document.getElementById('editModal');let aLogo=document.getElementById('edALogo').value,hLogo=document.getElementById('edHLogo').value;
  if(aLogo==='(업로드됨)')aLogo=modal._origALogo;if(hLogo==='(업로드됨)')hLogo=modal._origHLogo;

// === 조작 잠금 시스템 ===
function initLock(){
  configRef.child('lockMinutes').on('value',s=>{const v=s.val();DEFAULT_LOCK_MIN=(v===0||v)?v:5;const sel=document.getElementById('lockMinInput');const cust=document.getElementById('lockMinCustom');if(DEFAULT_LOCK_MIN===0){if(sel)sel.value='0';if(cust)cust.value='';if(cust)cust.placeholder='분'}else{if(sel)sel.value='custom';if(cust&&!cust.matches(':focus'))cust.value=DEFAULT_LOCK_MIN}});
  lockRef.on('value',s=>{
    lockData=s.val();
    updateLockUI();
  });
  if(lockCountdown)clearInterval(lockCountdown);
  lockCountdown=setInterval(updateLockUI,1000);
}
function isLocked(){return lockData&&lockData.deviceId&&lockData.lockedAt}
function isMyLock(){return isLocked()&&lockData.deviceId===deviceId}
function lockExpired(){if(!isLocked())return true;if(DEFAULT_LOCK_MIN===0)return false;const elapsed=(Date.now()-lockData.lockedAt)/1000/60;return elapsed>=DEFAULT_LOCK_MIN}
function canControl(){if(isAdmin)return true;if(!isLocked()||lockExpired())return true;return isMyLock()}
function toggleLock(){
  if(isMyLock()&&!lockExpired()){lockRef.remove();return}
  if(isAdmin&&isLocked()&&!isMyLock()){lockRef.remove();return}
  if(isLocked()&&!lockExpired()&&!isAdmin){return}
  lockRef.set({deviceId:deviceId,lockedAt:Date.now()});
}
function extendLock(){if(isMyLock()&&!lockExpired()&&DEFAULT_LOCK_MIN!==0){lockRef.update({lockedAt:Date.now()})}}
function forceUnlock(){lockRef.remove()}
function saveLockMin(){
  const sel=document.getElementById('lockMinInput').value;
  const custom=document.getElementById('lockMinCustom').value.trim();
  let v;
  if(sel==='0'&&!custom){v=0}
  else if(custom){v=parseInt(custom);if(isNaN(v)||v<1){alert('1분 이상 입력하세요');return}}
  else{v=0}
  configRef.child('lockMinutes').set(v);alert(v===0?'잠금 시간: 무제한':'잠금 시간: '+v+'분');
}
function updateLockUI(){
  const statusEl=document.getElementById('lockStatus');
  const timeEl=document.getElementById('lockTime');
  const btnEl=document.getElementById('lockBtn');
  const overlayEl=document.getElementById('lockOverlay');
  const gameTab=document.getElementById('tabGame');
  const descEl=document.getElementById('lockDesc');
  if(!statusEl)return;
  if(!isLocked()||lockExpired()){
    if(lockExpired()&&isLocked())lockRef.remove();
    statusEl.textContent='잠금 없음';statusEl.style.color='#888';
    timeEl.textContent='';
    btnEl.textContent='조작 잠금';btnEl.style.background='#0f3460';
    if(overlayEl)overlayEl.style.display='none';
    if(descEl)descEl.style.display='block';
    if(gameTab)gameTab.style.opacity='1';gameTab.style.pointerEvents='auto';
    return;
  }
  if(descEl)descEl.style.display='none';
  const remain=DEFAULT_LOCK_MIN===0?-1:Math.max(0,DEFAULT_LOCK_MIN*60-Math.floor((Date.now()-lockData.lockedAt)/1000));
  if(remain===-1){timeEl.textContent='무제한'}else{const mm=Math.floor(remain/60),ss=remain%60;timeEl.textContent=mm+'분 '+(ss<10?'0':'')+ss+'초';}
  if(isMyLock()){
    statusEl.textContent='내가 조작 중';statusEl.style.color='#4caf50';
    btnEl.textContent='잠금 해제';btnEl.style.background='#e94560';
    if(overlayEl)overlayEl.style.display='none';
    if(gameTab){gameTab.style.opacity='1';gameTab.style.pointerEvents='auto'}
  }else if(isAdmin){
    statusEl.textContent='다른 기기 조작 중 (관리자)';statusEl.style.color='#ff9800';
    btnEl.textContent='강제 해제';btnEl.style.background='#e94560';
    if(overlayEl)overlayEl.style.display='none';
    if(gameTab){gameTab.style.opacity='1';gameTab.style.pointerEvents='auto'}
  }else{
    statusEl.textContent='다른 기기에서 조작 중';statusEl.style.color='#e94560';
    btnEl.textContent='잠금됨';btnEl.style.background='#ccc';
    if(overlayEl)overlayEl.style.display='block';
    if(gameTab){gameTab.style.opacity='0.4';gameTab.style.pointerEvents='none'}
  }
}

// === 타자/투수 정보 시스템 ===
function initBatterInfo(){
  batterInfoRef.on('value',s=>{
    const d=s.val();if(d)biData=d;else biData={visible:false,mode:'batter',position:'center',batterOrder:1,batterName:'',batterNumber:'',atBats:[],pitcherName:'',pitcherNumber:'',pitchCount:0};
    updateBiUI();
  });
  buildBiSelects();
}
function buildBiSelects(){
  const batSel=document.getElementById('biBatOrder');
  const pitSel=document.getElementById('biPitcherSel');
  if(!batSel)return;
  // 타순 1-9 (라인업 타순에서 가져오기)
  let batOpts='<option value="">선택</option>';
  for(let i=1;i<=9;i++){
    const bo=ld.battingOrder&&ld.battingOrder[i];
    const nm=bo&&bo.name&&bo.name!=='-'?bo.name:'';
    const num=bo&&bo.number?'#'+bo.number+' ':'';
    batOpts+=`<option value="${i}">${i}번 ${num}${nm||'(미정)'}</option>`;
  }
  batSel.innerHTML=batOpts;
  if(biData.batterOrder)batSel.value=biData.batterOrder;
  // 투수 선택 (로스터에서 투수만)
  if(pitSel){
    let pitOpts='<option value="">선택</option>';
    rosterList.forEach(r=>{
      if(r.position==='P')pitOpts+=`<option value="${r.key}">#${r.number} ${r.name}</option>`;
    });
    // 투수가 아닌 선수도 선택 가능하도록 전체 추가
    pitOpts+='<optgroup label="전체 선수">';
    rosterList.forEach(r=>{
      if(r.position!=='P')pitOpts+=`<option value="${r.key}">#${r.number} ${r.name}</option>`;
    });
    pitOpts+='</optgroup>';
    pitSel.innerHTML=pitOpts;
    // 현재 투수 선택 복원
    if(biData.pitcherKey)pitSel.value=biData.pitcherKey;
  }
}
function updateBiUI(){
  const $=id=>document.getElementById(id);
  const onBtn=$('biOn'),offBtn=$('biOff'),ctrl=$('biControls');
  if(!onBtn)return;
  onBtn.className=biData.visible?'active':'';
  offBtn.className=!biData.visible?'active':'';
  if(ctrl)ctrl.style.display=biData.visible?'block':'none';
  // 모드
  const mb=$('biModeBatter'),mp=$('biModePitcher');
  if(mb)mb.className='bi-mode-btn'+(biData.mode==='batter'?' active':'');
  if(mp)mp.className='bi-mode-btn'+(biData.mode==='pitcher'?' active':'');
  if($('biBatterPanel'))$('biBatterPanel').style.display=biData.mode==='batter'?'block':'none';
  if($('biPitcherPanel'))$('biPitcherPanel').style.display=biData.mode==='pitcher'?'block':'none';
  // 위치
  ['left','center','right'].forEach(p=>{const b=$('biPos'+p.charAt(0).toUpperCase()+p.slice(1));if(b)b.className='bi-pos-btn'+(biData.position===p?' active':'')});
  // 타자 표시
  const disp=$('biBatterDisp');
  if(disp){
    if(biData.batterName)disp.textContent=(biData.batterNumber?'#'+biData.batterNumber+' ':'')+biData.batterName;
    else disp.textContent='-';
  }
  // 타석 결과
  const abList=$('biAtBatsList');
  if(abList){
    const abs=biData.atBats||[];
    if(abs.length){abList.innerHTML=abs.map((a,i)=>`<span class="bi-ab-tag">${a}<span class="del" onclick="removeAtBat(${i})">×</span></span>`).join('')}
    else{abList.innerHTML='<span style="color:#aaa;font-size:12px">결과 없음</span>'}
  }
  // 투수 표시
  const pDisp=$('biPitcherDisp');
  if(pDisp){
    if(biData.pitcherName)pDisp.textContent=(biData.pitcherNumber?'#'+biData.pitcherNumber+' ':'')+biData.pitcherName;
    else pDisp.textContent='-';
  }
  const pVal=$('biPitchVal');
  if(pVal)pVal.textContent=biData.pitchCount||0;
  // 타순 셀렉트 복원
  const batSel=$('biBatOrder');
  if(batSel&&biData.batterOrder)batSel.value=biData.batterOrder;
}
function setBiVisible(on){extendLock();batterInfoRef.update({visible:on})}
function setBiMode(mode){extendLock();batterInfoRef.update({mode})}
function setBiPos(pos){extendLock();batterInfoRef.update({position:pos})}
function onBatOrderChange(){
  extendLock();
  const sel=document.getElementById('biBatOrder');
  const order=parseInt(sel.value);if(!order)return;
  // 현재 타자 결과 저장
  saveCurBatterResults();
  const bo=ld.battingOrder&&ld.battingOrder[order];
  const name=bo&&bo.name&&bo.name!=='-'?bo.name:'';
  const number=bo&&bo.number?bo.number:'';
  // 저장된 결과 불러오기
  const saved=(biData.batterResults&&biData.batterResults[order])||[];
  batterInfoRef.update({batterOrder:order,batterName:name,batterNumber:number,atBats:saved});
}
function nextBatter(){
  extendLock();
  // 현재 타자 결과 저장
  saveCurBatterResults();
  const cur=biData.batterOrder||1;
  const next=cur>=9?1:cur+1;
  const bo=ld.battingOrder&&ld.battingOrder[next];
  const name=bo&&bo.name&&bo.name!=='-'?bo.name:'';
  const number=bo&&bo.number?bo.number:'';
  const saved=(biData.batterResults&&biData.batterResults[next])||[];
  batterInfoRef.update({batterOrder:next,batterName:name,batterNumber:number,atBats:saved});
}
function saveCurBatterResults(){
  const order=biData.batterOrder;
  if(!order)return;
  const abs=biData.atBats||[];
  const br=biData.batterResults||{};
  br[order]=abs;
  batterInfoRef.update({batterResults:br});
}
function addAtBat(result){
  extendLock();
  const abs=biData.atBats||[];
  abs.push(result);
  const order=biData.batterOrder;
  const br=biData.batterResults||{};
  if(order)br[order]=abs;
  batterInfoRef.update({atBats:abs,batterResults:br});
}
function removeAtBat(idx){
  extendLock();
  const abs=biData.atBats||[];
  abs.splice(idx,1);
  const order=biData.batterOrder;
  const br=biData.batterResults||{};
  if(order)br[order]=abs;
  batterInfoRef.update({atBats:abs,batterResults:br});
}
function clearAllAtBats(){
  if(!confirm('모든 타자의 타석 기록을 초기화할까요?\n(새 경기 시작 시 사용)'))return;
  extendLock();
  batterInfoRef.update({atBats:[],batterResults:{},pitchCount:0,pitcherCounts:{}});
}
function onPitcherChange(){
  extendLock();
  // 현재 투수 투구수 저장
  saveCurPitchCount();
  const sel=document.getElementById('biPitcherSel');
  const r=rosterList.find(x=>x.key===sel.value);
  if(r){
    const saved=(biData.pitcherCounts&&biData.pitcherCounts[r.key])||0;
    batterInfoRef.update({pitcherKey:r.key,pitcherName:r.name,pitcherNumber:r.number,pitchCount:saved});
  }
}
function saveCurPitchCount(){
  const key=biData.pitcherKey;
  if(!key)return;
  const pc=biData.pitcherCounts||{};
  pc[key]=biData.pitchCount||0;
  batterInfoRef.update({pitcherCounts:pc});
}
function chPitch(d){
  extendLock();
  const val=Math.max(0,(biData.pitchCount||0)+d);
  const key=biData.pitcherKey;
  const pc=biData.pitcherCounts||{};
  if(key)pc[key]=val;
  batterInfoRef.update({pitchCount:val,pitcherCounts:pc});
}
function resetPitch(){
  extendLock();
  const key=biData.pitcherKey;
  const pc=biData.pitcherCounts||{};
  if(key)pc[key]=0;
  batterInfoRef.update({pitchCount:0,pitcherCounts:pc});
}

function saveTheme(){
  const name=document.getElementById('ovThemeName').value.trim();
  if(!name){alert('테마 이름을 입력하세요');return}
  const cfg=gatherOvCfg();
  themesRef.push({name,cfg,createdAt:Date.now()});
  document.getElementById('ovThemeName').value='';
  alert('테마 "'+name+'" 저장 완료');
}
function loadThemes(){
  themesRef.on('value',s=>{
    const el=document.getElementById('ovThemeList');if(!el)return;
    const d=s.val();
    if(!d){el.innerHTML='<div style="text-align:center;color:#aaa;padding:8px;font-size:13px">저장된 테마 없음</div>';return}
    const entries=Object.entries(d);entries.sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
    el.innerHTML=entries.map(([k,t])=>{
      const colors=t.cfg?[t.cfg.colorBg,t.cfg.colorBorder,t.cfg.colorScore].filter(Boolean):[];
      const dots=colors.map(c=>'<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+c+';border:1px solid #ddd"></span>').join('');
      return '<div style="display:flex;align-items:center;padding:10px;background:#f8f8f8;border-radius:10px;margin-bottom:4px;gap:8px"><div style="flex:1"><div style="font-weight:700;font-size:14px">'+t.name+'</div><div style="display:flex;gap:3px;margin-top:3px">'+dots+'</div></div><div style="display:flex;gap:4px"><button style="padding:6px 10px;font-size:12px;background:#4caf50;color:#fff;border:none;border-radius:8px" onclick="applyTheme(\''+k+'\')">적용</button><button style="padding:6px 10px;font-size:12px;background:#e94560;color:#fff;border:none;border-radius:8px" onclick="delTheme(\''+k+'\')">삭제</button></div></div>';
    }).join('');
  });
}
function applyTheme(k){
  themesRef.child(k).once('value',s=>{
    const t=s.val();if(!t||!t.cfg)return;
    configRef.child('overlay').set(t.cfg);alert('테마 "'+t.name+'" 적용 완료');
  });
}
function delTheme(k){if(confirm('이 테마를 삭제할까요?'))themesRef.child(k).remove()}

checkSessionOnLoad();
</script>
</body>
</html>
