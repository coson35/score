<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스코어보드 컨트롤러</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#f5f5f5;color:#222;min-height:100vh;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;border:1px solid #ddd;border-radius:12px;font-weight:700;transition:all 0.1s;background:#fff;color:#222}
button:active{transform:scale(0.96)}
input{font-family:inherit;border-radius:12px;border:1px solid #ddd;background:#fff;color:#222;padding:12px 14px;font-size:16px;width:100%}
input:focus{outline:none;border-color:#e94560}

/* 로그인 */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;padding:24px;background:#fff}
#loginScreen h2{font-size:24px;color:#222}
#loginScreen input{max-width:280px;text-align:center;font-size:20px}
.role-btns{display:flex;gap:12px;width:100%;max-width:280px}
.role-btn{flex:1;padding:14px;font-size:16px;border-radius:12px;border:2px solid #ddd;background:#fff;color:#888}
.role-btn.active-admin{border-color:#e94560;background:#e94560;color:#fff}
.role-btn.active-user{border-color:#0f3460;background:#0f3460;color:#fff}
.login-btn{background:#222;color:#fff;padding:14px 50px;font-size:18px;border:none;border-radius:12px;width:100%;max-width:280px}
#loginError{color:#e94560;font-size:14px;display:none}
.login-credit{color:#bbb;font-size:11px;margin-top:20px}

/* 터치 반응 */
.bso-dot:active,.base-b:active{transform:scale(0.9);opacity:0.7}

/* 메인 */
#mainApp{display:none;padding:12px;padding-bottom:70px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.top-bar .title{font-size:17px;font-weight:900}
.logout-btn{background:#f0f0f0;color:#e94560;padding:8px 14px;font-size:13px;border:none}

/* 오버레이 토글 */
.overlay-section{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ov-btn{padding:12px;font-size:14px;border-radius:12px;text-align:center;border:2px solid #ddd;background:#fff;color:#888}
.ov-btn.on{background:#4caf50;color:#fff;border-color:#4caf50}
.ov-btn.off-active{background:#fff;color:#999;border-color:#ccc;box-shadow:inset 0 0 0 2px #eee}
</style>
</head>
<body>
<div id="loginScreen">
  <h2>⚾ 스코어보드</h2>
  <div class="role-btns">
    <button class="role-btn active-admin" id="roleAdmin" onclick="selectRole('admin')">🔒 관리자</button>
    <button class="role-btn" id="roleUser" onclick="selectRole('user')">👤 사용자</button>
  </div>
  <input type="password" id="pwInput" placeholder="관리자 비밀번호" autocomplete="off">
  <button class="login-btn" onclick="doLogin()">입장</button>
  <div id="loginError">비밀번호가 틀렸습니다</div>
  <div class="login-credit">박지후아빠 개발</div>
</div>
<div id="mainApp"></div>
<style>
/* 카드 */
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.card-title{font-size:16px;font-weight:700;margin-bottom:12px;text-align:center}

/* 점수 */
.score-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
.score-team{text-align:center}
.score-team .name{font-size:16px;font-weight:900;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-team .val{font-size:44px;font-weight:900}
.score-team .btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;padding:0 4px}
.score-team .btns button{padding:10px 0;font-size:18px;border-radius:10px}
.btn-plus{background:#4caf50;color:#fff;border:none}
.btn-minus{background:#f0f0f0;color:#222}
.score-vs{font-size:20px;color:#ccc;padding:0 6px}
.swap-btn{width:100%;padding:12px;font-size:15px;background:#ff9800;color:#fff;border:none;border-radius:12px;margin-top:10px}

/* 이닝 */
.inning-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.inning-row .arrow{width:48px;height:48px;font-size:20px;border-radius:50%;background:#f0f0f0}
.inning-row .val{font-size:32px;font-weight:900;min-width:80px;text-align:center}
.half-btn{padding:12px 24px;font-size:15px;background:#ff9800;color:#fff;border:none;border-radius:12px}

/* BSO */
.bso-row{display:flex;align-items:center;margin-bottom:14px}
.bso-row .bso-name{font-size:16px;font-weight:700;min-width:70px}
.bso-row .dots{display:flex;gap:10px;flex:1;justify-content:center}
.bso-dot{width:44px;height:44px;border-radius:50%;border:2px solid #ddd;background:#f8f8f8;cursor:pointer}
.bso-dot.b-on{background:#4caf50;border-color:#4caf50}
.bso-dot.s-on{background:#ffd700;border-color:#ffd700}
.bso-dot.o-on{background:#e94560;border-color:#e94560}
.bso-reset{display:block;margin:0 auto;padding:10px 24px;font-size:14px;background:#f0f0f0;border-radius:12px}

/* 베이스 */
.base-wrap{position:relative;width:140px;height:140px;margin:0 auto 12px}
.base-b{position:absolute;width:44px;height:44px;transform:rotate(45deg);border:2px solid #ddd;background:#f8f8f8;cursor:pointer;border-radius:6px}
.base-b.on{background:#ffd700;border-color:#ffd700}
.base-b.b2{left:48px;top:0}
.base-b.b3{left:0;top:48px}
.base-b.b1{right:0;top:48px}
.base-clear{display:block;margin:0 auto;padding:10px 24px;font-size:14px;background:#f0f0f0;border-radius:12px}

/* 탭 */
.tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;z-index:100}
.tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:700;color:#bbb;background:#fff;border:none;border-radius:0;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab svg{width:20px;height:20px;fill:currentColor}
.tab.active{color:#e94560}

/* 폼 */
.form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.form-row label{font-size:13px;color:#888;min-width:55px;font-weight:600}
.form-row input{flex:1}

/* 경기 목록 */
.game-list{max-height:300px;overflow-y:auto}
.game-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#f8f8f8;border-radius:12px;margin-bottom:6px;border:2px solid transparent}
.game-item.active-game{border-color:#0f3460;background:#eef3ff}
.game-item .info{font-size:14px;font-weight:600;flex:1;min-width:0}
.game-item .info .sub{color:#888;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.game-item .btns{display:flex;gap:4px;flex-shrink:0}
.game-item .btns button{padding:6px 10px;font-size:12px;border-radius:8px}
</style>
<style>
/* 라인업 */
.lin-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.lin-row .pos{font-size:14px;font-weight:900;color:#e94560;min-width:30px;text-align:center}
.lin-row input{flex:1;padding:10px;font-size:14px}
.lin-row .num{max-width:55px}

.btn-save{width:100%;padding:12px;font-size:15px;background:#0f3460;color:#fff;border:none;border-radius:12px;margin-top:8px}
.btn-apply{width:100%;padding:12px;font-size:15px;background:#4caf50;color:#fff;border:none;border-radius:12px;margin-top:8px}
.btn-danger{width:100%;padding:12px;font-size:15px;background:#e94560;color:#fff;border:none;border-radius:12px;margin-top:8px}
.btn-warn{width:100%;padding:12px;font-size:15px;background:#ff9800;color:#fff;border:none;border-radius:12px;margin-top:8px}

/* 라인업 모드 토글 */
.lineup-mode-section{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mode-btn{padding:12px;font-size:14px;border-radius:12px;text-align:center;border:2px solid #ddd;background:#fff;color:#888}
.mode-btn.active{background:#0f3460;color:#fff;border-color:#0f3460}

/* 타순 라인업 입력 */
.bat-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.bat-row .order{font-size:16px;font-weight:900;color:#0f3460;min-width:24px;text-align:center}
.bat-row input{flex:1;padding:10px;font-size:14px}
.bat-row .num{max-width:55px}
.bat-row select{padding:10px;font-size:14px;border-radius:12px;border:1px solid #ddd;background:#fff;max-width:70px}

/* 수정 모달 */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
.modal .card-title{margin-bottom:16px}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(firebaseConfig);
const db=firebase.database(),gameRef=db.ref('game'),lineupRef=db.ref('lineup'),savedGamesRef=db.ref('savedGames'),configRef=db.ref('config');
let isAdmin=false,selectedRole='admin',activeGameKey='';
const DEFAULT_ADMIN_PW='admin1234';
let gd={visible:false,gameTitle:'',awayName:'AWAY',homeName:'HOME',awayScore:0,homeScore:0,awayLogo:'',homeLogo:'',inning:1,inningHalf:'top',balls:0,strikes:0,outs:0,base1:false,base2:false,base3:false};
let ld={visible:false,teamName:'',players:{},displayMode:'defense'};
const POS=['P','C','1B','2B','3B','SS','LF','CF','RF'];
const PN={P:'투수',C:'포수','1B':'1루수','2B':'2루수','3B':'3루수',SS:'유격수',LF:'좌익수',CF:'중견수',RF:'우익수'};
let scoreVisible=false,lineupVisible=false;

function selectRole(r){selectedRole=r;document.getElementById('roleAdmin').className='role-btn'+(r==='admin'?' active-admin':'');document.getElementById('roleUser').className='role-btn'+(r==='user'?' active-user':'');document.getElementById('pwInput').placeholder=r==='admin'?'관리자 비밀번호':'사용자 비밀번호'}
function doLogin(){const pw=document.getElementById('pwInput').value;if(!pw){alert('비밀번호를 입력하세요');return}document.getElementById('loginError').style.display='none';if(selectedRole==='admin'){configRef.child('adminPassword').once('value',s=>{if(pw===(s.val()||DEFAULT_ADMIN_PW)){isAdmin=true;enterApp()}else document.getElementById('loginError').style.display='block'})}else{configRef.child('userPassword').once('value',s=>{if(!s.val()){alert('사용자 비밀번호가 설정되지 않았습니다.\n관리자에게 문의하세요.');return}if(pw===s.val()){isAdmin=false;enterApp()}else document.getElementById('loginError').style.display='block'})}}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function doLogout(){location.reload()}
function enterApp(){document.getElementById('loginScreen').style.display='none';const m=document.getElementById('mainApp');m.style.display='block';m.style.padding='12px';m.style.paddingBottom='70px';buildUI();initApp()}
</script>
<script>
function buildUI(){
const m=document.getElementById('mainApp');
let h=`<div class="top-bar"><span class="title">⚾ 스코어보드</span><button class="logout-btn" onclick="doLogout()">로그아웃</button></div>`;
h+=`<div class="overlay-section">
<button class="ov-btn" id="ovScoreOn" onclick="setOv('score',true)">스코어 ON</button>
<button class="ov-btn" id="ovScoreOff" onclick="setOv('score',false)">스코어 OFF</button>
<button class="ov-btn" id="ovLineupOn" onclick="setOv('lineup',true)">라인업 ON</button>
<button class="ov-btn" id="ovLineupOff" onclick="setOv('lineup',false)">라인업 OFF</button>
</div>`;
h+=`<div id="tabGame" class="tab-content"></div>`;
h+=`<div id="tabSetup" class="tab-content" style="display:none"></div>`;
h+=`<div id="tabLineup" class="tab-content" style="display:none"></div>`;
h+=`<div id="tabAdmin" class="tab-content" style="display:none"></div>`;
h+=`<div class="tabs">
<div class="tab active" onclick="switchTab('tabGame',this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M2.5 9.5Q7 11 12 7t9.5 2.5M2.5 14.5Q7 13 12 17t9.5-2.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>경기</div>
<div class="tab" onclick="switchTab('tabSetup',this)"><svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" fill="none" stroke="currentColor" stroke-width="2"/></svg>경기설정</div>
<div class="tab" onclick="switchTab('tabLineup',this)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="9" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" fill="none" stroke="currentColor" stroke-width="2"/></svg>라인업</div>
<div class="tab" id="tabAdminBtn" onclick="switchTab('tabAdmin',this)" style="display:none"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" fill="none" stroke="currentColor" stroke-width="2"/></svg>관리</div>
</div>`;
m.innerHTML=h;
if(isAdmin)document.getElementById('tabAdminBtn').style.display='flex';
buildGameTab();buildSetupTab();buildLineupTab();buildAdminTab();
}
</script>
<script>
function buildGameTab(){
document.getElementById('tabGame').innerHTML=`
<div class="card">
  <div class="score-grid">
    <div class="score-team"><div class="name" id="cAway">AWAY</div><div class="val" id="cAwayS">0</div><div class="btns"><button class="btn-plus" onclick="chScore('away',1)">+1</button><button class="btn-minus" onclick="chScore('away',-1)">-1</button></div></div>
    <div class="score-vs">vs</div>
    <div class="score-team"><div class="name" id="cHome">HOME</div><div class="val" id="cHomeS">0</div><div class="btns"><button class="btn-plus" onclick="chScore('home',1)">+1</button><button class="btn-minus" onclick="chScore('home',-1)">-1</button></div></div>
  </div>
  <button class="swap-btn" onclick="swapHA()"><svg viewBox="0 0 24 24" width="18" height="18" style="vertical-align:middle;margin-right:4px"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>선후공 변경</button>
</div>
<div class="card">
  <div class="card-title">이닝</div>
  <div class="inning-row"><button class="arrow" onclick="chInn(-1)">◀</button><div class="val"><span id="cHalf">▲</span> <span id="cInn">1</span>회</div><button class="arrow" onclick="chInn(1)">▶</button></div>
  <div style="text-align:center"><button class="half-btn" onclick="togHalf()">초 ↔ 말</button></div>
</div>
<div class="card">
  <div class="card-title">카운트</div>
  <div class="bso-row"><span class="bso-name">볼</span><div class="dots"><div class="bso-dot" id="bd0" onclick="togBSO('balls',1)"></div><div class="bso-dot" id="bd1" onclick="togBSO('balls',2)"></div><div class="bso-dot" id="bd2" onclick="togBSO('balls',3)"></div></div></div>
  <div class="bso-row"><span class="bso-name">스트라이크</span><div class="dots"><div class="bso-dot" id="sd0" onclick="togBSO('strikes',1)"></div><div class="bso-dot" id="sd1" onclick="togBSO('strikes',2)"></div></div></div>
  <div class="bso-row"><span class="bso-name">아웃</span><div class="dots"><div class="bso-dot" id="od0" onclick="togBSO('outs',1)"></div><div class="bso-dot" id="od1" onclick="togBSO('outs',2)"></div></div></div>
  <button class="bso-reset" onclick="rstCnt()">카운트 초기화</button>
</div>
<div class="card">
  <div class="card-title">베이스</div>
  <div class="base-wrap"><div class="base-b b2" id="cB2" onclick="togB(2)"></div><div class="base-b b3" id="cB3" onclick="togB(3)"></div><div class="base-b b1" id="cB1" onclick="togB(1)"></div></div>
  <button class="base-clear" onclick="clrB()">베이스 클리어</button>
</div>`}
</script>
<script>
function buildSetupTab(){
document.getElementById('tabSetup').innerHTML=`
<div class="card">
  <div class="card-title">경기 정보</div>
  <div class="form-row"><label>경기명</label><input id="inTitle" placeholder="예: 스토브리그 in 창녕"></div>
  <div class="form-row"><label>원정팀</label><input id="inAway" placeholder="원정팀명"></div>
  <div class="form-row"><label>홈팀</label><input id="inHome" placeholder="홈팀명"></div>
  <div class="form-row"><label>원정로고</label><input id="inALogo" placeholder="로고 URL (선택)"></div>
  <div class="form-row"><label></label><input type="file" id="fileALogo" accept="image/*" onchange="uploadLogo('away')" style="font-size:13px;padding:8px"></div>
  <div class="form-row"><label>홈로고</label><input id="inHLogo" placeholder="로고 URL (선택)"></div>
  <div class="form-row"><label></label><input type="file" id="fileHLogo" accept="image/*" onchange="uploadLogo('home')" style="font-size:13px;padding:8px"></div>
  <button class="btn-save" onclick="saveG()"><svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align:middle;margin-right:4px"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" fill="none" stroke="#fff" stroke-width="2"/><polyline points="17 21 17 13 7 13 7 21" fill="none" stroke="#fff" stroke-width="2"/><polyline points="7 3 7 8 15 8" fill="none" stroke="#fff" stroke-width="2"/></svg>경기 저장</button>
  <button class="btn-apply" onclick="applyG()"><svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align:middle;margin-right:4px"><polyline points="20 6 9 17 4 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>바로 적용</button>
</div>
<div class="card"><div class="card-title">저장된 경기</div><div class="game-list" id="gList"></div></div>`}
</script>
<script>
function buildLineupTab(){
let h=`<div class="card"><div class="card-title">라인업 표시 모드</div>
<div class="lineup-mode-section">
<button class="mode-btn active" id="modeDefense" onclick="setLineupMode('defense')">⛳ 수비 위치</button>
<button class="mode-btn" id="modeBatting" onclick="setLineupMode('batting')">📋 타순</button>
</div></div>`;
h+=`<div class="card"><div class="card-title">우리팀 선발 라인업</div><div class="form-row"><label>팀명</label><input id="linTeam" placeholder="우리팀 이름"></div><div style="margin-top:8px">`;
POS.forEach(p=>{h+=`<div class="lin-row"><span class="pos">${p}</span><input id="ln-${p}" placeholder="${PN[p]}"><input class="num" id="ln-n-${p}" placeholder="#" type="number"></div>`});
h+=`</div>`;
h+=`<div style="margin-top:12px"><div class="card-title">타순 설정</div>`;
for(let i=1;i<=9;i++){
h+=`<div class="bat-row"><span class="order">${i}</span><input id="bat-name-${i}" placeholder="${i}번 타자"><input class="num" id="bat-num-${i}" placeholder="#" type="number"><select id="bat-pos-${i}"><option value="">포지션</option>`;
POS.forEach(p=>{h+=`<option value="${p}">${p}</option>`});
h+=`</select></div>`}
h+=`</div>`;
h+=`<button class="btn-save" onclick="saveLin()"><svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align:middle;margin-right:4px"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" fill="none" stroke="#fff" stroke-width="2"/><polyline points="17 21 17 13 7 13 7 21" fill="none" stroke="#fff" stroke-width="2"/><polyline points="7 3 7 8 15 8" fill="none" stroke="#fff" stroke-width="2"/></svg>라인업 저장</button>`;
h+=`<button class="btn-apply" onclick="applyLin()"><svg viewBox="0 0 24 24" width="16" height="16" style="vertical-align:middle;margin-right:4px"><polyline points="20 6 9 17 4 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>라인업 표시</button></div>`;
document.getElementById('tabLineup').innerHTML=h;
}

function setLineupMode(mode){
  lineupRef.update({displayMode:mode});
  document.getElementById('modeDefense').className='mode-btn'+(mode==='defense'?' active':'');
  document.getElementById('modeBatting').className='mode-btn'+(mode==='batting'?' active':'');
}
</script>
<script>
function buildAdminTab(){
document.getElementById('tabAdmin').innerHTML=`
<div class="card"><div class="card-title">🔒 관리자 비밀번호</div><div class="form-row"><label>새 비번</label><input id="nAdmPw" type="password" placeholder="새 관리자 비밀번호"></div><button class="btn-save" onclick="chAdmPw()">변경</button></div>
<div class="card"><div class="card-title">👤 사용자 비밀번호</div><div class="form-row"><label>현재</label><input id="curUPw" readonly style="color:#e94560;font-weight:700"></div><div class="form-row"><label>새 비번</label><input id="nUPw" placeholder="새 사용자 비밀번호"></div><button class="btn-warn" onclick="chUPw()">변경</button><button class="btn-danger" onclick="rstUPw()">삭제</button></div>`}

function initApp(){
  if(isAdmin)configRef.child('userPassword').on('value',s=>{const el=document.getElementById('curUPw');if(el)el.value=s.val()||'(없음)'});
  gameRef.on('value',s=>{const d=s.val();if(!d)return;gd=d;scoreVisible=!!gd.visible;updUI();updOvBtns()});
  lineupRef.on('value',s=>{const d=s.val();if(d){ld=d;lineupVisible=!!ld.visible;updOvBtns();
    // 라인업 모드 버튼 동기화
    const dm=d.displayMode||'defense';
    const md=document.getElementById('modeDefense'),mb=document.getElementById('modeBatting');
    if(md)md.className='mode-btn'+(dm==='defense'?' active':'');
    if(mb)mb.className='mode-btn'+(dm==='batting'?' active':'');
  }});
  loadGames();
}
</script>
<script>
function updUI(){
  const $=id=>document.getElementById(id);
  if($('cAway'))$('cAway').textContent=gd.awayName||'AWAY';
  if($('cHome'))$('cHome').textContent=gd.homeName||'HOME';
  if($('cAwayS'))$('cAwayS').textContent=gd.awayScore||0;
  if($('cHomeS'))$('cHomeS').textContent=gd.homeScore||0;
  if($('cInn'))$('cInn').textContent=gd.inning||1;
  if($('cHalf'))$('cHalf').textContent=gd.inningHalf==='bottom'?'▼':'▲';
  for(let i=0;i<3;i++){const el=$('bd'+i);if(el)el.className='bso-dot'+(i<(gd.balls||0)?' b-on':'')}
  for(let i=0;i<2;i++){const el=$('sd'+i);if(el)el.className='bso-dot'+(i<(gd.strikes||0)?' s-on':'')}
  for(let i=0;i<2;i++){const el=$('od'+i);if(el)el.className='bso-dot'+(i<(gd.outs||0)?' o-on':'')}
  ['1','2','3'].forEach(n=>{const el=$('cB'+n);if(el)el.className='base-b b'+n+(gd['base'+n]?' on':'')});
}

function updOvBtns(){
  const $=id=>document.getElementById(id);
  if($('ovScoreOn'))$('ovScoreOn').className='ov-btn'+(scoreVisible?' on':'');
  if($('ovScoreOff'))$('ovScoreOff').className='ov-btn'+(!scoreVisible?' off-active':'');
  if($('ovLineupOn'))$('ovLineupOn').className='ov-btn'+(lineupVisible?' on':'');
  if($('ovLineupOff'))$('ovLineupOff').className='ov-btn'+(!lineupVisible?' off-active':'');
}

function setOv(t,on){if(t==='score'){gameRef.update({visible:on});scoreVisible=on}else{lineupRef.update({visible:on});lineupVisible=on}updOvBtns()}
function chScore(t,d){const k=t==='away'?'awayScore':'homeScore';gameRef.update({[k]:Math.max(0,(gd[k]||0)+d)})}
function swapHA(){gameRef.update({awayName:gd.homeName,homeName:gd.awayName,awayScore:gd.homeScore,homeScore:gd.awayScore,awayLogo:gd.homeLogo||'',homeLogo:gd.awayLogo||''})}
function chInn(d){gameRef.update({inning:Math.max(1,(gd.inning||1)+d)})}
function togHalf(){gameRef.update({inningHalf:gd.inningHalf==='top'?'bottom':'top'})}
function togBSO(t,v){gameRef.update({[t]:(gd[t]||0)>=v?v-1:v})}
function rstCnt(){gameRef.update({balls:0,strikes:0,outs:0})}
function togB(n){gameRef.update({['base'+n]:!gd['base'+n]})}
function clrB(){gameRef.update({base1:false,base2:false,base3:false})}
function switchTab(id,el){document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).style.display='block';el.classList.add('active')}
</script>
<script>
function chAdmPw(){const p=document.getElementById('nAdmPw').value;if(!p||p.length<4){alert('4자 이상');return}configRef.child('adminPassword').set(p);alert('변경 완료');document.getElementById('nAdmPw').value=''}
function chUPw(){const p=document.getElementById('nUPw').value;if(!p){alert('입력하세요');return}configRef.child('userPassword').set(p);alert('설정: '+p);document.getElementById('curUPw').value=p;document.getElementById('nUPw').value=''}
function rstUPw(){if(confirm('삭제할까요?')){configRef.child('userPassword').remove();document.getElementById('curUPw').value='(없음)'}}

function saveG(){savedGamesRef.push({gameTitle:document.getElementById('inTitle').value,awayName:document.getElementById('inAway').value,homeName:document.getElementById('inHome').value,awayLogo:document.getElementById('inALogo').value,homeLogo:document.getElementById('inHLogo').value,createdAt:Date.now()});alert('저장 완료')}
function applyG(){gameRef.update({gameTitle:document.getElementById('inTitle').value,awayName:document.getElementById('inAway').value||'AWAY',homeName:document.getElementById('inHome').value||'HOME',awayLogo:document.getElementById('inALogo').value,homeLogo:document.getElementById('inHLogo').value,awayScore:0,homeScore:0,inning:1,inningHalf:'top',balls:0,strikes:0,outs:0,base1:false,base2:false,base3:false});alert('적용 완료')}

function loadGames(){savedGamesRef.on('value',s=>{const el=document.getElementById('gList');if(!el)return;el.innerHTML='';const d=s.val();if(!d)return;Object.entries(d).forEach(([k,g])=>{
el.innerHTML+=`<div class="game-item${k===activeGameKey?' active-game':''}" id="gi-${k}">
<div class="info"><div class="sub">${g.gameTitle||'제목없음'}</div>${g.awayName||'?'} vs ${g.homeName||'?'}</div>
<div class="btns">
<button style="background:#ff9800;color:#fff;border:none" onclick="editG('${k}')">수정</button>
<button style="background:#4caf50;color:#fff;border:none" onclick="loadG('${k}')">적용</button>
<button style="background:#e94560;color:#fff;border:none" onclick="delG('${k}')">삭제</button>
</div></div>`})})}

function loadG(k){activeGameKey=k;savedGamesRef.child(k).once('value',s=>{const g=s.val();if(!g)return;gameRef.update({gameTitle:g.gameTitle||'',awayName:g.awayName||'AWAY',homeName:g.homeName||'HOME',awayLogo:g.awayLogo||'',homeLogo:g.homeLogo||'',awayScore:0,homeScore:0,inning:1,inningHalf:'top',balls:0,strikes:0,outs:0,base1:false,base2:false,base3:false});loadGames()})}
function delG(k){if(confirm('삭제?')){if(k===activeGameKey)activeGameKey='';savedGamesRef.child(k).remove()}}
</script>
<script>
function editG(k){
  savedGamesRef.child(k).once('value',s=>{
    const g=s.val();if(!g)return;
    const modal=document.createElement('div');
    modal.className='modal-bg';
    modal.id='editModal';
    modal.innerHTML=`<div class="modal">
      <div class="card-title">경기 정보 수정</div>
      <div class="form-row"><label>경기명</label><input id="edTitle" value="${g.gameTitle||''}"></div>
      <div class="form-row"><label>원정팀</label><input id="edAway" value="${g.awayName||''}"></div>
      <div class="form-row"><label>홈팀</label><input id="edHome" value="${g.homeName||''}"></div>
      <div class="form-row"><label>원정로고</label><input id="edALogo" value="${(g.awayLogo||'').length>100?'(업로드됨)':g.awayLogo||''}"></div>
      <div class="form-row"><label></label><input type="file" id="edFileALogo" accept="image/*" style="font-size:13px;padding:8px"></div>
      <div class="form-row"><label>홈로고</label><input id="edHLogo" value="${(g.homeLogo||'').length>100?'(업로드됨)':g.homeLogo||''}"></div>
      <div class="form-row"><label></label><input type="file" id="edFileHLogo" accept="image/*" style="font-size:13px;padding:8px"></div>
      <button class="btn-save" onclick="saveEditG('${k}')">저장</button>
      <button class="btn-danger" onclick="closeEditModal()" style="margin-top:6px">취소</button>
    </div>`;
    document.body.appendChild(modal);
    // 로고 파일 업로드 핸들러
    document.getElementById('edFileALogo').onchange=function(){
      const f=this.files[0];if(!f)return;if(f.size>500000){alert('500KB 이하');return}
      const r=new FileReader();r.onload=e=>{document.getElementById('edALogo').value=e.target.result};r.readAsDataURL(f);
    };
    document.getElementById('edFileHLogo').onchange=function(){
      const f=this.files[0];if(!f)return;if(f.size>500000){alert('500KB 이하');return}
      const r=new FileReader();r.onload=e=>{document.getElementById('edHLogo').value=e.target.result};r.readAsDataURL(f);
    };
    // 기존 로고 데이터 보존
    modal._origALogo=g.awayLogo||'';
    modal._origHLogo=g.homeLogo||'';
  });
}

function saveEditG(k){
  const modal=document.getElementById('editModal');
  let aLogo=document.getElementById('edALogo').value;
  let hLogo=document.getElementById('edHLogo').value;
  if(aLogo==='(업로드됨)')aLogo=modal._origALogo;
  if(hLogo==='(업로드됨)')hLogo=modal._origHLogo;
  savedGamesRef.child(k).update({
    gameTitle:document.getElementById('edTitle').value,
    awayName:document.getElementById('edAway').value,
    homeName:document.getElementById('edHome').value,
    awayLogo:aLogo,
    homeLogo:hLogo
  });
  closeEditModal();
  alert('수정 완료');
}

function closeEditModal(){const m=document.getElementById('editModal');if(m)m.remove()}
</script>
<script>
function saveLin(){
  const p={};
  POS.forEach(pos=>{p[pos]={name:document.getElementById('ln-'+pos).value||'-',number:document.getElementById('ln-n-'+pos).value||''}});
  const battingOrder={};
  for(let i=1;i<=9;i++){
    battingOrder[i]={name:document.getElementById('bat-name-'+i).value||'-',number:document.getElementById('bat-num-'+i).value||'',position:document.getElementById('bat-pos-'+i).value||''};
  }
  lineupRef.set({
    visible:ld.visible||false,
    displayMode:ld.displayMode||'defense',
    teamName:document.getElementById('linTeam').value||'우리팀',
    players:p,
    battingOrder:battingOrder
  }).then(()=>alert('저장 완료')).catch(e=>alert('실패: '+e.message));
}

function applyLin(){
  const p={};
  POS.forEach(pos=>{p[pos]={name:document.getElementById('ln-'+pos).value||'-',number:document.getElementById('ln-n-'+pos).value||''}});
  const battingOrder={};
  for(let i=1;i<=9;i++){
    battingOrder[i]={name:document.getElementById('bat-name-'+i).value||'-',number:document.getElementById('bat-num-'+i).value||'',position:document.getElementById('bat-pos-'+i).value||''};
  }
  lineupRef.set({
    visible:true,
    displayMode:ld.displayMode||'defense',
    teamName:document.getElementById('linTeam').value||'우리팀',
    players:p,
    battingOrder:battingOrder
  }).then(()=>alert('라인업 표시됩니다')).catch(e=>alert('실패: '+e.message));
}

function uploadLogo(team){
  const fileInput=document.getElementById(team==='away'?'fileALogo':'fileHLogo');
  const file=fileInput.files[0];if(!file)return;
  if(file.size>500000){alert('파일이 너무 큽니다 (500KB 이하)');return}
  const reader=new FileReader();
  reader.onload=function(e){
    document.getElementById(team==='away'?'inALogo':'inHLogo').value=e.target.result;
    alert('로고가 업로드되었습니다');
  };
  reader.readAsDataURL(file);
}
</script>
</body>
